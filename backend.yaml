apiVersion: apps/v1
kind: Deployment
metadata: { name: backend }
spec:
  selector: { matchLabels: { app: backend } }
  template:
    metadata: { labels: { app: backend } }
    spec:
      containers:
      - name: api
        image: 192.168.1.254:5002/person-backend:v101.0
        env: [{ name: MONGO_URI, value: "mongodb://192.168.1.254:27017/persondb" }]
        ports: [{ containerPort: 3002 }]
---
apiVersion: v1
kind: Service
metadata: { name: backend-service }
spec:
  type: NodePort
  selector: { app: backend }
  ports: [{ port: 3002, targetPort: 3002, nodePort: 30002 }]