apiVersion: apps/v1
kind: Deployment
metadata: { name: frontend }
spec:
  selector: { matchLabels: { app: frontend } }
  template:
    metadata: { labels: { app: frontend } }
    spec:
      containers:
      - name: web
        image: 192.168.1.254:5002/person-frontend:v106.0  # Use your latest pushed image
        ports: [{ containerPort: 80 }]               # Changed from 80 to 3000
---
apiVersion: v1
kind: Service
metadata: { name: frontend-service }
spec:
  type: NodePort
  selector: { app: frontend }
  ports: 
    - port: 80           # The service still listens on 80
      targetPort: 80    # But it forwards traffic to 3000 inside the pod
      nodePort: 30080